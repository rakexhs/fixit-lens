name: FixItLens
options:
  bundleIdPrefix: com.fixitlens
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
targets:
  FixItLens:
    type: application
    platform: iOS
    sources:
      - path: FixItLens
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fixitlens.app
        INFOPLIST_FILE: FixItLens/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        GENERATE_INFOPLIST_FILE: false
    info:
      path: FixItLens/Info.plist
